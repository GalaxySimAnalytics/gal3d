name: Bug Report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Minimal Reproducible Example
      render: python
      description: |
        A minimal code snippet that reproduces the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened? Paste any traceback here.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: gal3d Version
      placeholder: "e.g. 0.2.1"
    validations:
      required: true

  - type: input
    id: python-version
    attributes:
      label: Python Version
      placeholder: "e.g. 3.12"
    validations:
      required: true

  - type: input
    id: numpy-version
    attributes:
      label: NumPy Version
      placeholder: "e.g. 2.2.0"
    validations:
      required: false