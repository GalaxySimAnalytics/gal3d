name: Build and Test

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        numpy-version: ["2.0.2", "2.2.0", "2.3.0"]
        exclude:
          - python-version: "3.10"
            numpy-version: "2.3.0"
          - python-version: "3.13"
            numpy-version: "2.0.2"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
        
      - name: Install prerequisites
        run: |
            python -m pip install --upgrade pip
            python -m pip install numpy==${{ matrix.numpy-version }}

      - name: Install package
        run: pip install .

      - name: Test import
        run: python -c "from gal3d import analyzer"

      - name: Run pytest for selected combos
        if: |
            (matrix.python-version == '3.10' && matrix.numpy-version == '2.0.2') ||
            (matrix.python-version == '3.13' && matrix.numpy-version == '2.3.0')
        run: |
            pip install ".[tests]"
            pytest tests/