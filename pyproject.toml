[project]
name = "gal3d"
version = "1.0.0"
description = "Build galaxy 3D mophology model"
authors = [
    {name = "Shuai LU",email = "lushuai@stu.xmu.edu.cn"}
]
readme = "README.md"
requires-python = ">=3.10,<3.13"
dependencies = [
    "scipy (>=1.15.2,<2.0.0)",
    "numba (>=0.61.0,<0.62.0)",
    "optimagic (>=0.5.1,<0.6.0)",
    "nlopt (>=2.9.1,<3.0.0)",
    "tqdm (>=4.67.1,<5.0.0)",
    "matplotlib (>=3.10.1,<4.0.0)",
    "numpy (>=2,<3)",
    "h5py (>=3.13.0,<4.0.0)",
]


[build-system]
requires = ["poetry-core>=2.0.0,<3.0.0"]
build-backend = "poetry.core.masonry.api"
